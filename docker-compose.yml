services:
  postgres:
    image: postgres:17-alpine
    container_name: wtap-flashcards-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wtap_flashcards}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-wtap_flashcards}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
