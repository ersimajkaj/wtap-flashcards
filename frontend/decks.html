<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="6" width="13" height="14" rx="2" transform="rotate(-8 9.5 13)"/>
            <rect x="8" y="4" width="13" height="14" rx="2"/>
          </svg>
        </span>
        <div>
          <h1>Flashcards</h1>
          <p class="subtitle">Make a deck. Study it. Or let AI turn your notes into cards.</p>
        </div>
      </div>
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main>
    <section class="form-section">
      <h2>New deck</h2>
      <form id="new-deck-form">
        <input type="text" id="deck-name" placeholder="Deck name — e.g. Web Development" required maxlength="100">
        <input type="text" id="deck-description" placeholder="Short description (optional)" maxlength="200">

        <div class="picker-row">
          <div class="picker">
            <label>Color</label>
            <div class="color-picker" id="color-picker"></div>
          </div>
        </div>

        <button type="submit" class="btn-primary">Create deck</button>
      </form>
    </section>

    <section>
      <div class="section-head">
        <h2>Your decks</h2>
        <span id="deck-count" class="muted"></span>
      </div>
      <div id="deck-list"></div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/decks.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
