<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <a href="decks.html" class="logo-link" aria-label="Back to all decks">
          <span class="logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="6" width="13" height="14" rx="2" transform="rotate(-8 9.5 13)"/>
              <rect x="8" y="4" width="13" height="14" rx="2"/>
            </svg>
          </span>
        </a>
        <div>
          <a href="decks.html" class="back-link">All decks</a>
          <h1 id="deck-title">Loading…</h1>
          <p id="deck-description" class="subtitle"></p>
        </div>
      </div>
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main>
    <nav class="tabs">
      <button class="tab active" data-tab="cards">Cards</button>
      <button class="tab" data-tab="generate">AI generate</button>
      <button class="tab" data-tab="study">Study</button>
    </nav>

    <section id="tab-cards" class="tab-content active">
      <div class="form-section">
        <h2>Add a card</h2>
        <form id="new-card-form">
          <textarea id="card-question" placeholder="Question" required maxlength="500"></textarea>
          <textarea id="card-answer" placeholder="Answer" required maxlength="1000"></textarea>
          <button type="submit" class="btn-primary">Add card</button>
        </form>
      </div>

      <div class="section-head">
        <h2>Cards</h2>
        <span id="card-count" class="muted"></span>
      </div>
      <div id="card-list"></div>
    </section>

    <section id="tab-generate" class="tab-content">
      <div class="form-section">
        <h2>Generate from notes</h2>
        <p class="hint">Paste a chapter, lecture notes, or an article. The AI pulls out the key ideas and writes flashcards.</p>
        <textarea id="ai-notes" placeholder="Paste your notes here…" rows="10" maxlength="20000"></textarea>
        <button id="generate-btn" class="btn-primary">Generate cards</button>
        <div id="generate-status"></div>
      </div>
    </section>

    <section id="tab-study" class="tab-content">
      <div id="study-card"></div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/decks.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/study.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
